name: Fork Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}
          fetch-depth: 0
      - uses: jdx/mise-action@v2
      - name: Build CLI binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "-s -w -X main.version=${{ github.event.inputs.tag }}" -o railpack ./cmd/cli
          tar czf railpack-${{ github.event.inputs.tag }}-x86_64-unknown-linux-musl.tar.gz railpack
          rm railpack
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.event.inputs.tag }} \
            railpack-${{ github.event.inputs.tag }}-x86_64-unknown-linux-musl.tar.gz \
            --title "railpack ${{ github.event.inputs.tag }}" \
            --notes "railpack based on upstream v0.22.1 with --cache-auth-basic for CPLN registries" \
            --prerelease
